name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # PHẦN CỦA ĐỨC: TEST VÀ ĐÓNG GÓI CODE (CI)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    
    # Thiết lập Database PostgreSQL ảo để chạy Test
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: todo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Cài đặt thư viện Backend
        run: cd backend && npm ci

      # --- BƯỚC MỚI ĐƯỢC THÊM VÀO ĐỂ FIX LỖI 500 ---
      - name: Khởi tạo Database (Tạo bảng todos)
        env:
          PGPASSWORD: password
        run: psql -h localhost -U postgres -d todo_test -f database/init.sql
      # ---------------------------------------------

      - name: Chạy Test Backend (Phải pass thì mới cho đi tiếp)
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: todo_test
          PORT: 8080
        run: cd backend && npm test

      # Đăng nhập vào Docker Hub bằng Secrets bạn đã tạo
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/devops-frontend:latest

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/devops-backend:latest

  # ==========================================
  # PHẦN CỦA LONG: ĐƯA LÊN SERVER AZURE (CD)
  # ==========================================
  deploy:
    # Lệnh này cực quan trọng: Bắt buộc Job Test của Đức phải XANH thì Long mới Deploy
    needs: build-and-test 
    
    # Chỉ khi nào code được Merge vào Main (bạn Long duyệt PR) thì mới chạy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code để copy file docker-compose sang Server
        uses: actions/checkout@v3

      - name: Gửi file docker-compose lên Azure Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,database/init.sql"
          target: "~/devops-project"

      - name: Kích hoạt Server chạy hệ thống
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/devops-project
            # Kéo bản cập nhật mới nhất từ Docker Hub về
            sudo docker-compose pull
            # Tắt ứng dụng cũ và bật ứng dụng mới lên
            sudo docker-compose down
            sudo docker-compose up -d